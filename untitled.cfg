sv_cheats 1				// sv_cheats is need for a lot of this stuff to work
mirv_cvar_unhide_all			// unhides some important commands
alias blank "echo """

echo "untitled cfg loaded. made by saq1b, james"
blank
echo "use the command u_help to see this again"
blank
alias u_help "echo "what would you like to do";blank;echo "see just my viewmodel - type u_viewmodel";echo "see just my game without viewmodel (useful if you recorded the viewmodel seperately) -type u_noviewmodel";echo "see just my HUD - type u_hud";echo "see my game without HUD (useful if you recorded the HUD seperately) - type u_nohud";echo "revert changes - type u_revert"
u_help

alias u_viewmodel "r_drawviewmodel 1;r_drawparticles 0;r_farz 1;cl_drawhud 0;r_drawskybox 0;r_draw3dskybox 0"
alias u_noviewmodel "r_drawviewmodel 0;r_drawparticles 1;r_farz -1;cl_drawhud 1;r_drawskybox 1;r_draw3dskybox 1"
alias u_hud "r_drawviewmodel 0;cl_drawhud 1;r_drawparticles 0;r_farz 1;r_drawskybox 0;r_draw3dskybox 0"
alias u_nohud "cl_drawhud 0;r_drawparticles 1;r_farz -1;r_drawskybox 1;r_draw3dskybox 1"

alias u_revert "r_drawviewmodel 1;r_drawparticles 1;r_farz -1;cl_drawhud 1;r_drawskybox 1;r_draw3dskybox 1"

